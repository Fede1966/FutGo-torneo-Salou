<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Acceso · FutGo</title>
    <link rel="stylesheet" href="login.css?v=20260628-2" />
  </head>
  <body>
    <main class="login-shell" aria-labelledby="login-title">
      <div class="card">
        <button id="login-close" class="login-close-button" type="button" aria-label="Cerrar acceso">×</button>
        <h1 id="login-title">Acceso a FutGo — Área técnica</h1>

        <form id="login-form" novalidate>
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" placeholder="tu@club.com" required />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Contraseña" required minlength="8" />

          <div class="hint">Si no tienes cuenta, contacta con el administrador.</div>

          <button id="submit" class="primary" type="submit">Iniciar sesión</button>

          <div id="message" role="status" aria-live="polite"></div>
        </form>

        <div class="links">
          <button id="forgot" class="link-button" type="button">¿Olvidaste tu contraseña?</button>
        </div>
      </div>
    </main>

    <script src="login.js?v=20260628-3"></script>
    <script>
      (function(){
        function goToGuestApp(){
          localStorage.removeItem('futgo_token');
          localStorage.setItem('futgo_user', JSON.stringify({
            id: 'guest',
            name: 'Invitado',
            email: '',
            role: 'invitado'
          }));
          window.location.href = '/#invitado';
        }

        document.getElementById('login-close')?.addEventListener('click', goToGuestApp);
      })();
    </script>
  </body>
</html>

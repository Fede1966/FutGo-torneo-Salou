<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FutGo | Gestión técnica</title>
    <link rel="stylesheet" href="styles.css?v=20260627-3" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- Login overlay (bloquea la app hasta autenticación) -->
    <div id="login-overlay" class="login-shell login-overlay" aria-hidden="false">
      <div class="card">
        <h1 id="login-title">Acceso a FutGo — Área técnica</h1>
        <form id="login-form" novalidate>
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" placeholder="tu@club.com" required />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Contraseña" required minlength="8" />
          <button id="toggle-password" class="link-button" type="button">Ver contraseña</button>

          <div class="hint">Si no tienes cuenta, contacta con el administrador.</div>

          <button id="submit" class="primary" type="submit">Iniciar sesión</button>
          <button id="guest-login" class="guest-button" type="button">Entrar como invitado</button>

          <div id="message" role="status" aria-live="polite"></div>
        </form>

        <div class="links">
          <button id="forgot" class="link-button" type="button">¿Olvidaste tu contraseña?</button>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img
            class="header-logo"
            src="assets/futgo-logo.png?v=20260620-1"
            alt="Logo FutGo"
          />
          <div>
            <strong>FutGo</strong>
            <span>Área técnica</span>
          </div>
        </div>
        <nav class="nav-tabs" aria-label="Navegación principal">
          <div class="nav-team-dropdown" id="nav-team-dropdown">
            <button class="nav-button nav-team-button active" id="nav-team-button" data-view="squad" type="button" aria-haspopup="true" aria-expanded="false">
              Equipos
              <span class="nav-team-caret" aria-hidden="true">▾</span>
            </button>
            <div class="nav-team-menu" id="nav-team-menu" hidden></div>
          </div>
          <button class="nav-button" data-view="matches">Partidos</button>
          <button class="nav-button" data-view="standings">Clasificación</button>
          <button class="nav-button" data-view="statistics">Estadísticas</button>
        </nav>
      </aside>

      <main class="main-content">
        <section class="toolbar">
          <div>
            <p class="eyebrow">Temporada 2026</p>
            <h1 id="page-title">Equipos</h1>
          </div>
          <div class="toolbar-actions">
            <button class="primary-button" id="context-action-button" type="button">Añadir jugador</button>
          </div>
        </section>

        <section id="squad-view" class="view active"></section>
        <section id="matches-view" class="view"></section>
        <section id="standings-view" class="view"></section>
        <section id="statistics-view" class="view"></section>
        <section id="player-detail-view" class="view"></section>
        <section id="match-detail-view" class="view"></section>
      </main>
    </div>

    <dialog id="team-dialog" class="modal">
      <form method="dialog" id="team-form" class="modal-card">
        <div class="modal-header">
          <h2 id="team-modal-title">Nuevo equipo</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Cerrar">×</button>
        </div>
        <input type="hidden" id="team-id" />
        <label>
          Nombre del equipo
          <input id="team-name" required maxlength="60" placeholder="Ejemplo: Athletic Club Juvenil A" />
        </label>
        <div class="modal-actions">
          <button class="danger-button" id="delete-team-button" type="button">Eliminar equipo</button>
          <button class="secondary-button" value="cancel" type="submit">Cancelar</button>
          <button class="primary-button" id="save-team-button" value="default" type="submit">Crear equipo</button>
        </div>
      </form>
    </dialog>

    <dialog id="player-dialog" class="modal">
      <form method="dialog" id="player-form" class="modal-card">
        <div class="modal-header">
          <h2 id="player-modal-title">Nuevo jugador</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Cerrar">×</button>
        </div>
        <input type="hidden" id="player-id" />
        <label>
          Nombre
          <input id="player-name" required maxlength="60" />
        </label>
        <div class="form-grid">
          <label>
            Dorsal
            <input id="player-number" required type="number" min="1" max="99" />
          </label>
          <label>
            Fecha nacimiento
            <input id="player-birthdate" required type="date" />
          </label>
        </div>
        <label>
          Posición
          <select id="player-position" required>
            <option>Portero</option>
            <option>Defensa</option>
            <option>Centrocampista</option>
            <option>Delantero</option>
          </select>
        </label>
        <label>
          Lateralidad
          <select id="player-laterality" required>
            <option>Diestro</option>
            <option>Zurdo</option>
            <option>Ambos</option>
          </select>
        </label>
        <label>
          Foto opcional
          <input id="player-photo" type="hidden" />
          <input id="player-photo-file" type="file" accept="image/*" />
        </label>
        <div class="photo-preview" id="player-photo-preview"></div>
        <div class="modal-actions">
          <button class="danger-button" id="delete-player-modal-button" type="button">Eliminar jugador</button>
          <button class="secondary-button" value="cancel" type="submit">Cancelar</button>
          <button class="primary-button" id="save-player-button" value="default" type="submit">Guardar</button>
        </div>
      </form>
    </dialog>

    <dialog id="match-dialog" class="modal">
      <form method="dialog" id="match-form" class="modal-card">
        <div class="modal-header">
          <h2 id="match-modal-title">Nuevo partido</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Cerrar">×</button>
        </div>
        <input type="hidden" id="match-id" />
        <div class="form-grid match-schedule-grid">
          <label>
            Jornada
            <input id="match-round" required type="number" min="1" />
          </label>
          <label>
            Fecha
            <input id="match-date" type="date" />
          </label>
          <label>
            Hora
            <input id="match-time" type="time" step="300" />
          </label>
        </div>
        <div class="form-grid">
          <label>
            Local
            <input id="match-home" required maxlength="60" />
          </label>
          <label>
            Visitante
            <input id="match-away" required maxlength="60" />
          </label>
        </div>
        <div class="form-grid">
          <label>
            Estado
            <select id="match-status">
              <option>Preparación</option>
              <option>Convocado</option>
              <option>Jugado</option>
            </select>
          </label>
          <label>
            Resultado
            <input id="match-score" maxlength="12" placeholder="0-0" />
          </label>
        </div>
        <h3 class="form-section-title">Estadísticas del equipo</h3>
        <div class="form-grid">
          <label>
            Tarjetas amarillas
            <input id="match-yellow-cards" type="number" min="0" value="0" />
          </label>
          <label>
            Tarjetas rojas
            <input id="match-red-cards" type="number" min="0" value="0" />
          </label>
        </div>
        <div class="form-grid">
          <label>
            Penaltis a favor
            <input id="match-penalties-for" type="number" min="0" value="0" />
          </label>
          <label>
            Penaltis en contra
            <input id="match-penalties-against" type="number" min="0" value="0" />
          </label>
        </div>
        <div class="form-grid">
          <label>
            Ocasiones generadas
            <input id="match-chances-created" type="number" min="0" value="0" />
          </label>
          <label>
            Ocasiones recibidas
            <input id="match-chances-against" type="number" min="0" value="0" />
          </label>
        </div>
        <div class="modal-actions">
          <button class="secondary-button" value="cancel" type="submit">Cancelar</button>
          <button class="primary-button" id="save-match-button" value="default" type="submit">Guardar</button>
        </div>
      </form>
    </dialog>

    <script src="app.js?v=20260628-3"></script>
    <script src="login.js"></script>
    <script>
      (function(){
        const overlay = document.getElementById('login-overlay');

        function isTokenValid(token) {
          if (!token) return false;
          try {
            const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            return typeof payload.exp === 'number' && payload.exp * 1000 > Date.now();
          } catch {
            return false;
          }
        }

        function update(){
          const token = localStorage.getItem('futgo_token');
          let user = null;
          try {
            user = JSON.parse(localStorage.getItem('futgo_user') || 'null');
          } catch {
            user = null;
          }
          if (isTokenValid(token) || user?.role === 'invitado') {
            overlay.style.display = 'none';
            overlay.setAttribute('aria-hidden','true');
            document.dispatchEvent(new CustomEvent('futgo:auth-changed'));
          } else {
            localStorage.removeItem('futgo_token');
            localStorage.removeItem('futgo_user');
            overlay.style.display = 'flex';
            overlay.setAttribute('aria-hidden','false');
            document.dispatchEvent(new CustomEvent('futgo:auth-changed'));
          }
        }
        window.addEventListener('storage', update);
        document.addEventListener('DOMContentLoaded', update);
      })();
    </script>
  </body>
</html>
